<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализ Растений AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .model-description {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .batch-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }

@keyframes shake-btn {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-5px); }
    40%, 80% { transform: translateX(5px); }
}

.filter-btn.shake {
    animation: shake-btn 0.4s ease-in-out;
    border-color: #ef4444 !important;
    box-shadow: 0 0 10px rgba(239, 68, 68, 0.4) !important;
}
        /* Image modal */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal-img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            /* Modal Zoom Controls */
            }


            .modal-img {
                max-width: 90vw;
                max-height: 90vh;
                border-radius: 12px;
                box-shadow: var(--shadow-md);
                transition: transform 0.3s ease;
                transform-origin: center center;
                cursor: grab;
            }

            .modal-img:active {
                cursor: grabbing;
            }

        /* Fix image black frames */
        .image-wrapper {
            background: transparent !important;
            box-shadow: none !important;
            border: none !important;
        }

        .result-image,
        .result-chart {
            object-fit: cover !important;
            cursor: zoom-in;
        }

        /* APP LAYOUT - Roboflow Style */
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: left;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 0.2rem;
        }

        header p {
            font-size: 1rem;
        }

        .logo-container {
            width: 60px;
            height: 60px;
            margin-bottom: 0;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
        }

        .app-layout {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .app-layout {
                flex-direction: row;
                align-items: flex-start;
            }

            .app-sidebar {
                width: 280px;
                flex-shrink: 0;
                position: sticky;
                top: 2rem;
                height: calc(100vh - 4rem);
                overflow-y: auto;
                padding-right: 0.5rem;
            }

            /* Hide scrollbar for sidebar */
            .app-sidebar::-webkit-scrollbar {
                width: 4px;
            }

            .app-sidebar::-webkit-scrollbar-track {
                background: transparent;
            }

            .app-sidebar::-webkit-scrollbar-thumb {
                background: var(--border-active);
                border-radius: 4px;
            }

            .app-content {
                flex-grow: 1;
                min-width: 0;
            }
        }

        /* Grid for multiple results */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1400px) {
            .results-grid.multi {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Compact cards for grid mode */
        .results-container {
            margin-bottom: 0;
        }

        .cards-layout {
            grid-template-columns: 1fr;
            /* Stack images and charts vertically inside the card */
            gap: 1.5rem;
        }

        .charts-column {
            display: flex;
            flex-direction: row;
            gap: 1rem;
        }

        .charts-column>* {
            flex: 1;
        }

        .upload-area {
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .drop-zone {
            height: 140px;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="glass-bg"></div>
    <div class="app-container">

        <header>
            <div class="header-left">
                <div class="logo-container">
                    <svg viewBox="0 0 24 24" fill="none" class="logo-icon" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22c0-4.418.001-8.204 0-12" />
                        <path d="M12 10c0-3 2-6 6-6-3 0-6 2-6 6z" fill="currentColor" />
                        <path d="M12 14c0-3-2-6-6-6 3 0 6 2 6 6z" fill="currentColor" />
                        <path d="M12 18c0-2.5 1.5-4 4-4-2 0-4 1.5-4 4z" fill="currentColor" />
                    </svg>
                </div>
                <div>
                    <h1>Анализ Растений AI</h1>
                    <p style="color: var(--text-secondary); margin: 0;">Сегментация и замер биометрических показателей
                    </p>
                </div>
            </div>
            <a href="/db" target="_blank" class="db-link-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <ellipse cx="12" cy="5" rx="9" ry="3" />
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" />
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
                </svg>
                База данных
            </a>
        </header>

        <main class="app-layout">
            <!-- SIDEBAR -->
            <aside class="app-sidebar premium-card"
                style="padding: 1rem; background: var(--glass-bg); display: flex; flex-direction: column; gap: 1rem;">
                <form id="upload-form" class="upload-area" style="padding: 0; margin: 0;">
                    <div class="drop-zone" id="drop-zone" style="height: 120px; margin-bottom: 1rem;">
                        <div class="upload-icon-wrapper" style="width: 32px; height: 32px; margin-bottom: 0.3rem;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="upload-icon">
                                <path d="M12 4v12m0-12l4 4m-4-4l-4 4m10 8H6" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </div>
                        <span class="drop-zone__prompt" style="font-size: 0.85rem;">
                            Перетащите файлы
                            <span class="prompt-subtext" style="font-size: 0.75rem;">или кликните</span>
                        </span>
                        <input type="file" name="file" id="file-input" class="drop-zone__input" accept="image/*"
                            multiple required>
                    </div>

                    <div class="settings-bar"
                        style="flex-direction: column; align-items: stretch; gap: 1rem; margin-bottom: 0;">
                        <!-- Model selector -->
                        <div class="model-selector" style="width: 100%;">
                            <span class="model-selector__label">Модель:</span>
                            <div style="display:flex; flex-direction:column; gap:0.5rem; flex:1;">
                                <label class="model-radio">
                                    <input type="radio" name="seg_model" value="unet" checked>
                                    <span class="model-radio__pill"
                                        style="width: 100%; text-align: center;">U-Net</span>
                                </label>
                                <label class="model-radio">
                                    <input type="radio" name="seg_model" value="yolo">
                                    <span class="model-radio__pill" style="width: 100%; text-align: center;">YOLO</span>
                                </label>
                            </div>
                        </div>

                        <p class="model-description" style="font-size: 0.75rem; margin-top: 0.5rem; line-height: 1.2;">
                            <strong>U-Net:</strong> Высокая точность.<br>
                            <strong>YOLO:</strong> Быстрая, общие рамки.
                        </p>
                    </div>

                    <!-- Loading Overlay -->
                    <div class="loading-overlay" id="loading-overlay">
                        <div class="scanner-box">
                            <div class="scanner-line"></div>
                        </div>
                        <p id="loading-text" style="font-size: 0.9rem;">Анализ...</p>
                    </div>
                </form>

                <!-- EXPORT ACTION -->
                <div id="batch-actions" class="batch-controls"
                    style="display: none; margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border-subtle);">
                    <h4
                        style="margin-bottom: 0.5rem; text-align: center; color: var(--text-secondary); font-size: 0.85rem;">
                        Экспорт результатов</h4>
                    <button onclick="exportAll()" class="btn-primary"
                        style="width: 100%; justify-content: center; background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.3); color: #a5b4fc; box-shadow: none; font-size: 0.9rem; padding: 0.6rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Скачать ZIP
                    </button>
                </div>
            </aside>

            <!-- MAIN CONTENT (RESULTS) -->
            <section class="app-content">
                <div id="results-gallery" class="results-grid">
                    <!-- Placeholder when empty -->
                    <div id="empty-state"
                        style="text-align: center; color: var(--text-secondary); padding: 4rem; opacity: 0.5;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                            style="margin-bottom: 1rem;">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <h2>Нет данных</h2>
                        <p>Загрузите изображения через панель слева для начала анализа.</p>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Image Modal -->
    <div class="modal-backdrop" id="imgModal" onclick="closeModal(event)">
    <button class="modal-close" onclick="document.getElementById('imgModal').classList.remove('open')">×</button>
    <img class="modal-img" id="modalImg" src="" alt="Zoomed Image">
    </div>

    <!-- JS TEMPLATE FOR A RESULT BLOCK -->
    <template id="result-template">
        <div class="results-container premium-card" data-analysis-id="" style="display: flex; flex-direction: column;">
            <!-- Hero Card -->
            <div class="result-hero"
                style="background: none; box-shadow: none; border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.5rem; border-radius: 0;">
                <div class="plant-class">
                    <h2 class="class-name-disp"
                        style="font-size: 1.1rem; margin: 0; display: flex; align-items: center; gap: 0.5rem;">
                        <!-- name -->
                        <span class="model-badge"></span>
                    </h2>
                    <div class="badges" style="flex-wrap: wrap; padding: 0.3rem 0.8rem; gap: 0.8rem;">
                        <span class="badge badge-length length-disp" style="font-size: 0.8rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="badge-icon">
                                <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                            </svg>
                        </span>
                        <span class="badge badge-area area-disp" style="font-size: 0.8rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="badge-icon">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            </svg>
                        </span>
                    </div>
                </div>
            </div>

            <div
                style="padding: 0.5rem 1rem 1rem 1rem; flex-grow: 1; display: flex; flex-direction: column; gap: 1rem;">

                <!-- Explicit 2-column internal layout: Left (Image) | Right (Scrollable Stats) -->
                <div class="cards-layout"
                     style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: start; height: auto;">

                    <!-- LEFT COLUMN: Segmentation Image -->
                    <div class="visual-card"
                         style="background: var(--surface-light); border-radius: 12px; padding: 0.75rem; height: auto; display: flex; flex-direction: column;">
                        <div
                            style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 0.5rem;">
                            <h3 style="margin: 0; font-size: 0.95rem;">Сегментация</h3>
                            <label class="custom-checkbox"
                                style="padding: 0.1rem 0.4rem; font-size: 0.7rem; margin: 0;">
                                <input type="checkbox" class="post-boxes-toggle" onchange="togglePostBoxes(this)">
                                <span>Рамки</span>
                            </label>
                        </div>
                        <div class="image-wrapper"
                            style="border-radius: 8px; overflow: hidden; background: #000 !important; display: flex; justify-content: center; flex-grow: 1;">
                            <img src="" alt="Сегментация" class="result-image main-img" onclick="openModal(this.src)"
                                style="max-height: 100%; width: auto; object-fit: contain;">
                        </div>
                    </div>

                    <!-- RIGHT COLUMN: Scrollable Stats (Filters -> Length Bar -> Area Bar -> Metrics) -->
                    <div class="stats-column"
                         style="height: auto; overflow-y: visible; display: flex; flex-direction: column; gap: 1rem; padding-right: 0.5rem;">

                        <!-- Filters -->
                        <div class="filter-controls"
                            style="display:none; background: var(--surface-light); border-radius: 12px; padding: 0.75rem;">
                            <h3 style="margin: 0 0 0.5rem 0; font-size: 0.95rem;">Отображение классов</h3>
                            <div class="filter-buttons" style="display: flex; flex-wrap: wrap; gap: 0.3rem;">
                            </div>
                        </div>
<!-- U-Net Color Legend -->
<div class="unet-legend" style="display:none; background: var(--surface-light); border-radius: 12px; padding: 0.75rem;">
    <h3 style="margin: 0 0 0.5rem 0; font-size: 0.95rem;">Легенда классов</h3>
    <div class="legend-items" style="display: flex; flex-direction: column; gap: 0.4rem;"></div>
</div>
                        <!-- Length Bar Chart -->
                        <div class="visual-card chart-card bar-card"
                            style="display:none; background: var(--surface-light); border-radius: 12px; padding: 0.75rem;">
                            <h3 style="margin: 0 0 0.5rem 0; font-size: 0.95rem;">Длина (мм)</h3>
                            <div class="image-wrapper"
                                style="border-radius: 8px; overflow: hidden; display: flex; justify-content: center; background: none; border: none; box-shadow: none;">
                                <img src="" alt="Статистика длин" class="result-chart bar-img"
                                    onclick="openModal(this.src)"
                                    style="max-height: 200px; width: auto; object-fit: contain;">
                            </div>
                        </div>

                        <!-- Area Bar Chart -->
                        <div class="visual-card chart-card pie-card"
                            style="display:none; background: var(--surface-light); border-radius: 12px; padding: 0.75rem;">
                            <h3 style="margin: 0 0 0.5rem 0; font-size: 0.95rem;">Площадь (мм²)</h3>
                            <div class="image-wrapper"
                                style="border-radius: 8px; overflow: hidden; display: flex; justify-content: center; background: none; border: none; box-shadow: none;">
                                <img src="" alt="Статистика площадей" class="result-chart pie-img area-img"
                                    onclick="openModal(this.src)"
                                    style="max-height: 200px; width: auto; object-fit: contain;">
                            </div>
                        </div>

                        <!-- Metrics Grid -->
                        <div class="metrics-card filter-card"
                            style="background: var(--surface-light); border-radius: 12px; padding: 0.75rem; margin: 0; box-shadow: none;">
                            <h3 style="margin: 0 0 0.5rem 0; font-size: 0.95rem;">Подробные метрики</h3>
                            <div class="metrics-grid" style="grid-template-columns: 1fr; gap: 0.5rem;">
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </template>

    <script>
        // ==================== STATE ====================
        let processedAnalysisIds = [];


        // ==================== UI HELPERS ====================
        function openModal(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imgModal').classList.add('open');
        }
        function closeModal(e) {
            if (e.target === document.getElementById('imgModal')) {
                document.getElementById('imgModal').classList.remove('open');
            }
        }
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') document.getElementById('imgModal').classList.remove('open');
        });

        // ==================== DRAG & DROP / UPLOAD LOGIC ====================
        const dropZoneElement = document.getElementById("drop-zone");
        const inputElement = document.getElementById("file-input");
        const loadingOverlay = document.getElementById("loading-overlay");
        const loadingText = document.getElementById("loading-text");
        const gallery = document.getElementById("results-gallery");
        const emptyState = document.getElementById("empty-state");
        const batchActions = document.getElementById("batch-actions");

        if (dropZoneElement) {
            dropZoneElement.addEventListener("click", e => {
                if (e.target === dropZoneElement || e.target.closest('.upload-icon-wrapper') || e.target.closest('.drop-zone__prompt')) {
                    inputElement.click();
                }
            });

            inputElement.addEventListener("change", e => {
                if (inputElement.files.length) {
                    processFiles(inputElement.files);
                }
            });

            dropZoneElement.addEventListener("dragover", e => { e.preventDefault(); dropZoneElement.classList.add("drop-zone--over"); });
            ["dragleave", "dragend"].forEach(type => { dropZoneElement.addEventListener(type, e => { dropZoneElement.classList.remove("drop-zone--over"); }); });
            dropZoneElement.addEventListener("drop", e => {
                e.preventDefault();
                if (e.dataTransfer.files.length) {
                    processFiles(e.dataTransfer.files);
                }
                dropZoneElement.classList.remove("drop-zone--over");
            });
        }

        async function processFiles(files) {
            if (files.length === 0) return;

            // Hide empty state
            if (emptyState) emptyState.style.display = 'none';

            // Show loading
            loadingOverlay.style.display = 'flex';
            setTimeout(() => { loadingOverlay.classList.add('active'); }, 10);

            const segModel = document.querySelector('input[name="seg_model"]:checked').value;
            const showBoxes = true;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                loadingText.innerText = `Анализ: ${file.name} (${i + 1}/${files.length})...`;

                const formData = new FormData();
                formData.append('file', file);
                formData.append('seg_model', segModel);
                formData.append('show_boxes', showBoxes ? 'on' : 'off');

                try {
                    const response = await fetch('/api/analyze', { method: 'POST', body: formData });
                    const data = await response.json();

                    if (data.success) {
                        renderResult(data, showBoxes);
                        processedAnalysisIds.push(data.analysis_id);
                    } else {
                        alert(`Ошибка файла ${file.name}: ${data.error}`);
                    }
                } catch (error) {
                    console.error(error);
                    alert(`Сетевая ошибка при загрузке ${file.name}`);
                }
            }

            // Hide loading overlay
            loadingOverlay.classList.remove('active');
            setTimeout(() => { loadingOverlay.style.display = 'none'; }, 400);

            // Update grid layout based on number of items
            if (processedAnalysisIds.length > 1) {
                gallery.classList.add('multi');
            }

            // Reset input
            inputElement.value = '';

            // Show export button
            if (processedAnalysisIds.length > 0) {
                batchActions.style.display = 'flex';
            }

            // Scroll to top of results
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==================== RENDER RESULT ====================
        function renderResult(data, initialShowBoxes) {
            const template = document.getElementById('result-template');
            const clone = template.content.cloneNode(true);
            const container = clone.querySelector('.results-container');
            container.dataset.analysisId = data.analysis_id;

            // Hero
            const nameDisp = clone.querySelector('.class-name-disp');
            const badge = clone.querySelector('.model-badge');
            badge.className = `model-badge model-badge--${data.seg_model}`;
            badge.innerText = data.seg_model.toUpperCase();
            nameDisp.innerHTML = `<span style="word-break: break-all;">${data.class_name || data.original_filename}</span> ` + badge.outerHTML;
            clone.querySelector('.length-disp').innerHTML += ` Длина: ${data.total_length} мм`;
            clone.querySelector('.area-disp').innerHTML += ` Площадь: ${data.total_area} мм²`;

            // Checkbox sync
            const postBoxToggle = clone.querySelector('.post-boxes-toggle');
            postBoxToggle.checked = initialShowBoxes;

            // Images
            clone.querySelector('.main-img').src = `data:image/jpeg;base64,${data.annotated_b64}`;

            if (data.chart_b64) {
                clone.querySelector('.pie-card').style.display = 'flex';
                clone.querySelector('.area-img').src = `data:image/jpeg;base64,${data.chart_b64}`;
            }
            if (data.bar_chart_b64) {
                clone.querySelector('.bar-card').style.display = 'flex';
                clone.querySelector('.bar-img').src = `data:image/jpeg;base64,${data.bar_chart_b64}`;
            }

            // Metrics & Filters
            const filterControls = clone.querySelector('.filter-controls');
            const filterButtons = clone.querySelector('.filter-buttons');
            const metricsGrid = clone.querySelector('.metrics-grid');

            if (data.seg_model === 'yolo' || data.seg_model === 'unet') {
                filterControls.style.display = 'block';
            }

            // Сортируем классы в фиксированном порядке для консистентности
const classOrder = ['корень', 'стебель', 'листок', 'колос'];
// Фиксированный порядок классов для кнопок
const allClasses = Object.keys(data.class_metrics).sort((a, b) => {
    const idxA = classOrder.indexOf(a.toLowerCase());
    const idxB = classOrder.indexOf(b.toLowerCase());
    return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
});
container.dataset.activeClasses = JSON.stringify(allClasses);

            // --- U-Net Color Legend ---
const legendContainer = clone.querySelector('.unet-legend');
const legendItems = clone.querySelector('.legend-items');
if (data.class_colors && Object.keys(data.class_colors).length > 0) {
    legendContainer.style.display = 'block';
    for (const [className, color] of Object.entries(data.class_colors)) {
        const item = document.createElement('div');
        item.style.display = 'flex';
        item.style.alignItems = 'center';
        item.style.gap = '0.5rem';
        item.style.fontSize = '0.85rem';
        item.style.color = 'var(--text-secondary)';

        const colorBox = document.createElement('div');
        colorBox.style.width = '16px';
        colorBox.style.height = '16px';
        colorBox.style.backgroundColor = color;
        colorBox.style.borderRadius = '4px';
        colorBox.style.border = '1px solid rgba(255,255,255,0.2)';

        const label = document.createElement('span');
        label.textContent = className.charAt(0).toUpperCase() + className.slice(1);

        item.appendChild(colorBox);
        item.appendChild(label);
        legendItems.appendChild(item);
    }
}

            for (const [c_name, metrics] of Object.entries(data.class_metrics)) {
                // Add Filter button
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'filter-btn active';
                btn.dataset.class = c_name;
                btn.dataset.classNormalized = c_name.toLowerCase();  // для надёжного сравнения
                btn.onclick = () => toggleClassFilter(container, c_name.toLowerCase(), btn);

                const displayName = c_name.charAt(0).toUpperCase() + c_name.slice(1);
                btn.innerHTML = `<span class="filter-btn-icon">👁</span> <span class="filter-btn-label">${displayName}</span> <span class="filter-btn-count">${metrics.count} шт.</span>`;
                filterButtons.appendChild(btn);

                // Add Metric Grid Item
                const mItem = document.createElement('div');
                mItem.className = 'metric-item';
                mItem.id = `metric-${data.analysis_id}-${c_name.toLowerCase()}`;
                mItem.innerHTML = `
                    <h4 class="metric-title">${displayName} ${metrics.count > 1 ? `<span class="count-tag">${metrics.count} шт.</span>` : ''}</h4>
                    <div class="metric-stats">
                        <p>Площадь <span class="stat-value">${parseFloat(metrics.area || 0).toFixed(2)} мм²</span></p>
                        <p>Длина <span class="stat-value">${parseFloat(metrics.length || 0).toFixed(2)} мм</span></p>
                    </div>
                `;
                metricsGrid.appendChild(mItem);
            }

            // Prepend new results
            gallery.prepend(clone);
        }

        // ==================== DYNAMIC FILTERING ====================
        async function toggleClassFilter(container, className, btnEl) {
    let active = JSON.parse(container.dataset.activeClasses);
    // Нормализуем имя класса для сравнения
const normalizedClassName = className.toLowerCase();
const normalizedActive = active.map(c => c.toLowerCase());
    const metricItem = container.querySelector(`#metric-${container.dataset.analysisId}-${className}`);

    // Если пытаемся снять галочку
    if (normalizedActive.includes(normalizedClassName)) {
        // Запрещаем снять последнюю галочку — трясём кнопку
        if (active.length === 1) {
            btnEl.classList.add('shake');
            setTimeout(() => btnEl.classList.remove('shake'), 400);
            return; // Прерываем без alert
        }

        active = active.filter(c => c.toLowerCase() !== normalizedClassName);
        btnEl.classList.remove('active');
        if (metricItem) { metricItem.style.opacity = '0.3'; metricItem.style.filter = 'grayscale(100%)'; }
    } else {
    if (!normalizedActive.includes(normalizedClassName)) {
        active.push(className);
    }
    btnEl.classList.add('active');
        if (metricItem) { metricItem.style.opacity = '1'; metricItem.style.filter = 'none'; }
    }
    container.dataset.activeClasses = JSON.stringify(active);

    await fetchUpdate(container);
}

        async function togglePostBoxes(checkbox) {
            const container = checkbox.closest('.results-container');
            await fetchUpdate(container, checkbox.checked);
        }

        async function fetchUpdate(container, overrideShowBoxes = null, classesOverride = undefined) {
    try {
        const analysisId = container.dataset.analysisId;

        // Если classesOverride не передан — берём из dataset
        const active = classesOverride !== undefined
            ? classesOverride
            : JSON.parse(container.dataset.activeClasses);

        const postBoxToggle = container.querySelector('.post-boxes-toggle');
        const showBoxes = overrideShowBoxes !== null ? overrideShowBoxes : postBoxToggle.checked;

        const img = container.querySelector('.main-img');
        img.style.opacity = '0.5';

        const response = await fetch('/api/filter', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
    analysis_id: analysisId,
    selected_classes: active.map(c => c.toLowerCase()),
    show_boxes: showBoxes
})
        });

                const data = await response.json();
                if (data.success && data.annotated_b64) {
                    img.src = `data:image/jpeg;base64,${data.annotated_b64}`;
                    img.onload = () => { img.style.opacity = '1'; };

                    const areaBadge = container.querySelector('.badge-area');
                    if (areaBadge && data.total_area) {
                        areaBadge.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="badge-icon"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /></svg> Площадь: ${data.total_area} мм²`;
                    }
                    const lengthBadge = container.querySelector('.badge-length');
                    if (lengthBadge && data.total_length) {
                        lengthBadge.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="badge-icon"><path d="M22 12h-4l-3 9L9 3l-3 9H2" /></svg> Длина: ${data.total_length} мм`;
                    }
                } else {
                    img.style.opacity = '1';
                }
            } catch (err) {
                console.error(err);
                container.querySelector('.main-img').style.opacity = '1';
            }
        }

        // ==================== EXPORT BATCH ====================
        async function exportAll() {
            if (processedAnalysisIds.length === 0) return;

            const btn = document.querySelector('#batch-actions .btn-primary');
            const originalText = btn.innerHTML;
            btn.innerText = 'Генерация архива...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ analysis_ids: processedAnalysisIds })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = 'analysis_export.zip';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                } else {
                    const err = await response.json();
                    alert(`Ошибка при экспорте: ${err.error}`);
                }
            } catch (err) {
                console.error(err);
                alert("Ошибка сети при скачивании");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

    </script>
